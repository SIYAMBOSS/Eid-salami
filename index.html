<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salami Wheel - Box Fix</title>
    <style>
        body { text-align: center; font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); margin: 0; padding: 15px; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #333; }
        .container { max-width: 420px; width: 100%; background: #ffffff; padding: 25px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .live-count { background: #eb4d4b; color: white; padding: 8px 20px; border-radius: 50px; font-size: 14px; font-weight: bold; display: inline-block; margin-bottom: 20px; }
        
        #canvasContainer { 
            position: relative; display: inline-block; border-radius: 50%; width: 320px; height: 320px;
            background: #f1f2f6; border: 10px solid #ffffff; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        #canvas { width: 100%; height: 100%; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
        .pointer { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #130f40; position: absolute; left: 50%; transform: translateX(-50%); z-index: 20; top: -5px; }
        
        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
        button { padding: 14px 20px; font-size: 15px; cursor: pointer; border: none; border-radius: 15px; transition: 0.3s; font-weight: bold; }
        .spin-btn { background: #ff4757; color: white; width: 100%; box-shadow: 0 6px #c0392b; text-transform: uppercase; }
        .share-btn { background: #27ae60; color: white; flex: 1; }
        .create-nav-btn { background: #f9ca24; color: #333; flex: 1; }
        
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 15% auto; padding: 25px; width: 85%; max-width: 320px; border-radius: 25px; text-align: left; }
        textarea, input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div class="live-count">🌍 Total Spins: <span id="viewCount">2,480</span></div>
    
    <div id="wheelSection">
        <h1 id="displayTitle" style="margin: 0; font-size: 24px;">Salami Wheel..!! 🖤</h1>
        <p id="displayCaption" style="color: #666; margin-bottom: 20px;">আপনার সালামি বুঝে নিন 🥰</p>
        
        <div style="position: relative; display: inline-block;">
            <div class="pointer"></div>
            <div id="canvasContainer">
                <canvas id="canvas" width="500" height="500"></canvas>
            </div>
        </div>

        <div class="controls">
            <button class="spin-btn" id="spinBtn" onclick="spinWheel()">Spin Now!</button>
            <button class="share-btn" onclick="shareLink()">Share Link</button>
            <button class="create-nav-btn" onclick="openCreateModal()">Create Mine</button>
        </div>
    </div>
</div>

<audio id="tickSound" src="https://www.soundjay.com/buttons/button-29.mp3"></audio>
<audio id="winSound" src="https://www.myinstants.com/media/sounds/tada.mp3"></audio>

<div id="winModal" class="modal">
    <div class="modal-content" style="text-align: center;">
        <h2 style="color: #ff4757;">🎊 অভিনন্দন!</h2>
        <p id="modalMsg" style="font-size: 24px; font-weight: bold; color: #333;"></p>
        <button onclick="closeModal('winModal')" style="background: #27ae60; color: white; width: 100%; padding: 12px; border-radius: 12px; margin-top: 10px;">সংগ্রহ করুন</button>
    </div>
</div>

<div id="createModal" class="modal">
    <div class="modal-content">
        <h3 style="text-align: center;">Create Your Wheel</h3>
        <label>Title:</label> <input type="text" id="formTitle" placeholder="Ex: Siyam's Salami">
        <label>Amounts (প্রতি লাইনে একটি টাকা):</label> 
        <textarea id="formItems" rows="6" placeholder="10&#10;20&#10;50&#10;100&#10;200"></textarea>
        <button onclick="generateLink()" style="background: #ff4757; color: white; width: 100%; padding: 12px; border-radius: 12px; margin-top: 10px; font-weight: bold;">Generate & Save</button>
        <button onclick="closeModal('createModal')" style="background: #ccc; width: 100%; padding: 8px; border-radius: 12px; margin-top: 5px;">Cancel</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const tickSound = document.getElementById('tickSound');
    const winSound = document.getElementById('winSound');
    const colors = ["#ff9f43", "#ee5253", "#1dd1a1", "#54a0ff", "#5f27cd", "#f368e0", "#ff6b6b", "#48dbfb"];
    
    let options = [];
    let isSpinning = false;
    let currentRotation = 0;

    // ১. ডাটা লোড এবং চাকা তৈরি
    function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const d = urlParams.get('d');
        if (d) {
            try {
                const decoded = JSON.parse(decodeURIComponent(escape(atob(d))));
                options = decoded.i;
                document.getElementById('displayTitle').innerText = decoded.t;
            } catch(e) { setDefault(); }
        } else { setDefault(); }
        drawWheel();
    }

    function setDefault() {
        options = ["5", "10", "2", "20", "50", "100"];
    }

    // ২. বক্স অনুযায়ী চাকা ড্র করা (Dynamically update boxes)
    function drawWheel() {
        const numSlices = options.length;
        const arc = (2 * Math.PI) / numSlices;
        ctx.clearRect(0, 0, 500, 500);

        for (let i = 0; i < numSlices; i++) {
            const angle = i * arc;
            ctx.fillStyle = colors[i % colors.length];
            ctx.beginPath();
            ctx.moveTo(250, 250);
            ctx.arc(250, 250, 250, angle, angle + arc);
            ctx.fill();

            // টেক্সট ড্র করা
            ctx.save();
            ctx.fillStyle = "white";
            ctx.font = "bold 22px Arial";
            ctx.translate(250, 250);
            ctx.rotate(angle + arc / 2);
            ctx.fillText(options[i] + " TK", 120, 10);
            ctx.restore();
        }
    }

    // ৩. স্পিন এবং সঠিক রেজাল্ট বের করা
    function spinWheel() {
        if (isSpinning) return;
        isSpinning = true;
        document.getElementById('spinBtn').disabled = true;

        const numSlices = options.length;
        const arcDeg = 360 / numSlices;
        const winningIndex = Math.floor(Math.random() * numSlices);

        // চাকা ঘোরানোর ডিগ্রি ক্যালকুলেশন
        const landingRotation = 360 - (winningIndex * arcDeg) - (arcDeg / 2);
        const extraSpins = 3600; // ১০ বার ঘুরবে
        const baseRotation = currentRotation - (currentRotation % 360);
        currentRotation = baseRotation + extraSpins + landingRotation + 90;

        canvas.style.transform = `rotate(${currentRotation}deg)`;

        // শব্দ করা
        let lastIdx = -1;
        const ticker = setInterval(() => {
            const style = window.getComputedStyle(canvas);
            const matrix = new WebKitCSSMatrix(style.transform);
            const angle = Math.atan2(matrix.m12, matrix.m11) * (180 / Math.PI);
            const norm = (360 - (angle < 0 ? angle + 360 : angle) + 90) % 360;
            const currentIdx = Math.floor(norm / arcDeg) % numSlices;
            
            if (currentIdx !== lastIdx) {
                tickSound.currentTime = 0;
                tickSound.play().catch(()=>{});
                lastIdx = currentIdx;
            }
        }, 60);

        setTimeout(() => {
            clearInterval(ticker);
            isSpinning = false;
            document.getElementById('spinBtn').disabled = false;
            winSound.play().catch(() => {});
            
            // রেজাল্ট দেখানো
            document.getElementById('modalMsg').innerText = "আপনি পেয়েছেন: " + options[winningIndex] + " Taka";
            document.getElementById('winModal').style.display = 'block';
        }, 4000);
    }

    // ৪. নতুন চাকা জেনারেট করা
    function generateLink() {
        const t = document.getElementById('formTitle').value.trim() || "Salami Wheel";
        const items = document.getElementById('formItems').value.split("\n").filter(x => x.trim() !== "");
        
        if (items.length < 2) {
            alert("কমপক্ষে ২টি টাকার পরিমাণ দিন!");
            return;
        }

        const data = { t: t, i: items };
        const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
        window.location.href = window.location.origin + window.location.pathname + "?d=" + encoded;
    }

    function openCreateModal() { document.getElementById('createModal').style.display = 'block'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function shareLink() { navigator.clipboard.writeText(window.location.href); alert("লিঙ্ক কপি হয়েছে!"); }

    window.onload = init;
</script>
</body>
</html>
