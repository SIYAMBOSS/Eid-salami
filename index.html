<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salami Wheel</title>
    <style>
        /* ব্যাকগ্রাউন্ড এখন ইমেজের বদলে ক্লিন কালার গ্রেডিয়েন্ট */
        body { text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); margin: 0; padding: 15px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 450px; width: 100%; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        
        /* অটো-ইনক্রিমেন্ট কাউন্টার স্টাইল */
        .live-count { background: #ff4757; color: white; padding: 8px 20px; border-radius: 30px; font-size: 14px; font-weight: bold; display: inline-block; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4); }
        .live-count span { color: #fff; font-size: 16px; border-bottom: 2px solid #ffeaa7; }

        /* চাকার কন্টেইনারে এখন শুধু কালার */
        #canvasContainer { 
            position: relative; display: inline-block; border-radius: 50%; width: 320px; height: 320px;
            background: #f1f2f6; border: 8px solid #fff; box-shadow: 0 8px 25px rgba(0,0,0,0.1); overflow: hidden;
        }
        #canvas { width: 100%; height: 100%; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        .pointer { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #2f3542; position: absolute; left: 50%; transform: translateX(-50%); z-index: 20; top: -5px; }
        
        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 25px; }
        button { padding: 12px 20px; font-size: 15px; cursor: pointer; border: none; border-radius: 12px; transition: 0.2s; font-weight: bold; }
        .spin-btn { background: #ff4757; color: white; width: 100%; margin-bottom: 5px; box-shadow: 0 5px #c0392b; text-transform: uppercase; letter-spacing: 1px; }
        .spin-btn:active { box-shadow: none; transform: translateY(5px); }
        .share-btn { background: #2ed573; color: white; flex: 1; }
        .edit-btn { background: #1e90ff; color: white; flex: 1; }
        
        /* মোডাল স্টাইল */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }
        .modal-content { background: white; margin: 20% auto; padding: 30px; width: 80%; max-width: 320px; border-radius: 25px; text-align: center; border: 4px solid #ff4757; }
        textarea, input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div id="liveCountBox" class="live-count">🌍 Total Spins: <span id="viewCount">1,240</span></div>
    
    <h1 id="displayTitle" style="font-size: 26px; margin: 5px 0 5px; color: #2f3542;">Salami Wheel..!! 🖤</h1>
    <p id="displayCaption" style="margin-top: 0; color: #747d8c; font-weight: 500;">আপনার সালামি বুঝে নিন 🥰</p>
    
    <div style="position: relative; display: inline-block; margin-top: 10px;">
        <div class="pointer"></div>
        <div id="canvasContainer">
            <canvas id="canvas" width="500" height="500"></canvas>
        </div>
    </div>

    <div class="controls">
        <button class="spin-btn" id="spinBtn" onclick="spinWheel()">Spin Now!</button>
        <button class="edit-btn" onclick="openEditModal()">Edit All</button>
        <button class="share-btn" onclick="shareLink()">Share Link</button>
    </div>
</div>

<audio id="tickSound" src="https://www.soundjay.com/buttons/button-29.mp3"></audio>
<audio id="winSound" src="https://www.myinstants.com/media/sounds/tada.mp3"></audio>

<div id="customModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle" style="color: #ff4757; margin-top: 0;">🎊 অভিনন্দন!</h2>
        <p id="modalMsg" style="font-size: 20px; font-weight: bold; color: #2f3542;"></p>
        <button onclick="closeModal('customModal')" style="background: #2ed573; color: white; width: 100%; padding: 12px; border-radius: 12px; margin-top: 10px;">সংগ্রহ করুন</button>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content" style="text-align: left;">
        <h3 style="text-align: center; margin-top: 0;">Settings</h3>
        <label>Title:</label> <input type="text" id="editTitle">
        <label>Caption:</label> <input type="text" id="editCaption">
        <label>Items (Per Line):</label> <textarea id="salamiItems" rows="5"></textarea>
        <div style="display: flex; gap: 10px;">
            <button onclick="updateAll()" style="background: #1e90ff; color: white; flex: 1;">Update</button>
            <button onclick="closeModal('editModal')" style="background: #ccc; flex: 1;">Cancel</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const tickSound = document.getElementById('tickSound');
    const winSound = document.getElementById('winSound');
    // কালার প্যালেট - ইমেজের বদলে এখন ব্রাইট কালার ব্যবহার করা হয়েছে
    const colors = ["#ff9f43", "#ee5253", "#1dd1a1", "#54a0ff", "#5f27cd", "#f368e0", "#ff6b6b", "#48dbfb"];
    
    let options = [];
    let isSpinning = false;
    let wheelID = "";
    let currentViews = 1240;

    function loadData() {
        const urlParams = new URLSearchParams(window.location.search);
        const encodedData = urlParams.get('d');
        
        if (encodedData) {
            try {
                const decoded = JSON.parse(atob(encodedData));
                options = decoded.i;
                document.getElementById('displayTitle').innerText = decoded.t;
                document.getElementById('displayCaption').innerText = decoded.c;
                wheelID = btoa(encodedData).substring(0, 10).replace(/[^a-zA-Z]/g, "x");
            } catch(e) { setDefault(); }
        } else { setDefault(); }
        
        drawWheel();
        initViewCounter();
    }

    function setDefault() {
        options = ["5", "10", "2", "5", "1", "20", "50", "100", "5", "10", "1", "2"];
        wheelID = "default_wheel";
    }

    // ভিউ কাউন্টার লজিক - ১-১ করে বাড়তে থাকবে
    function initViewCounter() {
        // আগেই জিতে থাকলে মেসেজ আপডেট
        const savedIdx = localStorage.getItem("res_" + wheelID);
        if (savedIdx !== null) {
            const savedOpts = loadSavedOptions() || options;
            document.getElementById('liveCountBox').innerHTML = `💸 আপনি আগেই 💸 <span>${savedOpts[savedIdx]} TK</span> পেয়েছেন`;
            document.getElementById('liveCountBox').style.background = "#2f3542";
        } else {
            // কেউ লিঙ্কে থাকলেও ভিউ অটোমেটিক বাড়বে
            setInterval(() => {
                currentViews += Math.floor(Math.random() * 3) + 1;
                document.getElementById('viewCount').innerText = currentViews.toLocaleString();
            }, 3000);
        }
    }

    function loadSavedOptions() {
        const encoded = localStorage.getItem("opt_" + wheelID);
        return encoded ? JSON.parse(atob(encoded)) : null;
    }

    function drawWheel() {
        const numOptions = options.length;
        const arc = (2 * Math.PI) / numOptions;
        ctx.clearRect(0,0,500,500);
        for(let i = 0; i < numOptions; i++) {
            const angle = i * arc;
            ctx.fillStyle = colors[i % colors.length];
            ctx.beginPath(); ctx.moveTo(250, 250);
            ctx.arc(250, 250, 250, angle, angle + arc, false); ctx.fill();
            ctx.save(); ctx.fillStyle = "white"; ctx.font = "bold 24px Arial";
            ctx.translate(250, 250); ctx.rotate(angle + arc/2);
            ctx.fillText(options[i] + " TK", 100, 10); ctx.restore();
        }
    }

    function spinWheel() {
        if (isSpinning) return;
        tickSound.play().then(() => tickSound.pause()); 
        isSpinning = true;
        document.getElementById('spinBtn').disabled = true;

        const numOptions = options.length;
        const arcDeg = 360 / numOptions;
        let targetIndex;

        const savedResult = localStorage.getItem("res_" + wheelID);
        if (savedResult !== null) {
            targetIndex = parseInt(savedResult);
        } else {
            // ৫০ এবং ১০০ টাকা বাদ দিয়ে র‍্যান্ডম রেজাল্ট
            let available = [];
            for (let i = 0; i < numOptions; i++) {
                if (options[i] !== "50" && options[i] !== "100") available.push(i);
            }
            targetIndex = available[Math.floor(Math.random() * available.length)];
            localStorage.setItem("res_" + wheelID, targetIndex);
            localStorage.setItem("opt_" + wheelID, btoa(JSON.stringify(options)));
        }

        const targetDeg = 360 - (targetIndex * arcDeg) - (arcDeg / 2);
        const extraDegrees = 3600 + targetDeg + 90;
        canvas.style.transform = `rotate(${extraDegrees}deg)`;

        let lastIdx = -1;
        const tickCheck = setInterval(() => {
            const style = window.getComputedStyle(canvas);
            const matrix = new WebKitCSSMatrix(style.transform);
            const angle = Math.atan2(matrix.m12, matrix.m11) * (180 / Math.PI);
            const norm = (angle < 0 ? angle + 360 : angle);
            const currentIdx = Math.floor((360 - (norm - 90) % 360) % 360 / arcDeg);
            if(currentIdx !== lastIdx) {
                tickSound.currentTime = 0;
                tickSound.play().catch(()=>{});
                lastIdx = currentIdx;
            }
        }, 100);

        setTimeout(() => {
            clearInterval(tickCheck);
            isSpinning = false;
            document.getElementById('spinBtn').disabled = false;
            winSound.play().catch(() => {});
            document.getElementById('modalMsg').innerText = "আপনি পেয়েছেন: " + options[targetIndex] + " Taka";
            document.getElementById('customModal').style.display = 'block';
        }, 4000);
    }

    function shareLink() {
        const url = window.location.href;
        navigator.clipboard.writeText(url).then(() => {
            alert("লিঙ্ক কপি হয়েছে! এখন বন্ধুদের পাঠান।");
        }).catch(() => {
            prompt("লিঙ্কটি কপি করুন:", url);
        });
    }

    function updateAll() {
        const data = {
            t: document.getElementById('editTitle').value,
            c: document.getElementById('editCaption').value,
            i: document.getElementById('salamiItems').value.split("\n").filter(s => s.trim() !== "")
        };
        const encoded = btoa(JSON.stringify(data));
        window.location.href = window.location.pathname + "?d=" + encoded;
    }

    function openEditModal() {
        document.getElementById('editTitle').value = document.getElementById('displayTitle').innerText;
        document.getElementById('editCaption').value = document.getElementById('displayCaption').innerText;
        document.getElementById('salamiItems').value = options.join("\n");
        document.getElementById('editModal').style.display = 'block';
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    window.onload = loadData;
</script>

</body>
</html>
