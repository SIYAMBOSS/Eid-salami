<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salami Wheel</title>
    <style>
        body { text-align: center; font-family: 'Arial', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #canvas { margin: 20px 0; border-radius: 50%; max-width: 100%; height: auto; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        button { padding: 12px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; transition: 0.3s; font-weight: bold; }
        .spin-btn { background: #ff4757; color: white; width: 100%; margin-bottom: 10px; }
        .share-btn { background: #2ed573; color: white; flex: 1; }
        .edit-btn { background: #1e90ff; color: white; flex: 1; }
        .pointer { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #333; position: absolute; left: 50%; transform: translateX(-50%); z-index: 10; top: -5px; }
        
        /* Modal Style */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { background: white; margin: 20% auto; padding: 25px; width: 85%; max-width: 350px; border-radius: 15px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        textarea { width: 100%; height: 150px; margin: 15px 0; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; resize: none; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="margin-bottom: 5px;">Salami Wheel..!! 🖤</h1>
    <p style="margin-top: 0;">Pick your EID salami..!! 🥰</p>
    
    <div style="position: relative; display: inline-block;">
        <div class="pointer"></div>
        <canvas id="canvas" width="400" height="400"></canvas>
    </div>

    <div class="controls">
        <button class="spin-btn" id="spinBtn" onclick="spinWheel()">Spin Now!</button>
        <button class="edit-btn" onclick="openEditModal()">Edit Salami</button>
        <button class="share-btn" onclick="shareLink()">Share Link</button>
    </div>
</div>

<div id="customModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">🎉 অভিনন্দন!</h2>
        <p id="modalMsg"></p>
        <button onclick="closeModal('customModal')" style="background: #ff4757; color: white; width: 100%; padding: 10px; border-radius: 8px;">OK</button>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>সালামির লিস্ট এডিট করুন</h3>
        <p style="font-size: 13px; color: #666;">প্রতি লাইনে একটি করে আইটেম লিখুন:</p>
        <textarea id="salamiItems"></textarea>
        <div style="display: flex; gap: 10px;">
            <button onclick="updateWheel()" style="background: #1e90ff; color: white; flex: 1;">Update</button>
            <button onclick="closeModal('editModal')" style="background: #ccc; flex: 1;">Cancel</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const colors = ["#ff595e", "#ffca3a", "#8ac926", "#1982c4", "#6a4c93", "#f72585", "#4cc9f0", "#3a0ca3", "#ff9f43", "#ee5253"];
    
    let options = [];
    let startAngle = 0;
    let isSpinning = false;

    // URL থেকে ডাটা লোড করা
    function loadData() {
        const urlParams = new URLSearchParams(window.location.search);
        const data = urlParams.get('items');
        if (data) {
            options = data.split(',').map(decodeURIComponent);
        } else {
            options = ["5 Taka", "10 Taka", "20 Taka", "50 Taka", "100 Taka", "2 Taka", "5 Taka", "10 Taka"];
        }
        drawWheel();
    }

    function drawWheel() {
        ctx.clearRect(0,0,400,400);
        const numOptions = options.length;
        const arc = (2 * Math.PI) / numOptions;
        
        for(let i = 0; i < numOptions; i++) {
            const angle = startAngle + i * arc;
            ctx.fillStyle = colors[i % colors.length];
            ctx.beginPath();
            ctx.moveTo(200, 200);
            ctx.arc(200, 200, 180, angle, angle + arc, false);
            ctx.fill();
            
            ctx.save();
            ctx.fillStyle = "white";
            ctx.font = "bold 15px Arial";
            ctx.translate(200 + Math.cos(angle + arc / 2) * 120, 200 + Math.sin(angle + arc / 2) * 120);
            ctx.rotate(angle + arc / 2 + Math.PI / 2);
            ctx.fillText(options[i], -ctx.measureText(options[i]).width / 2, 0);
            ctx.restore();
        }
    }

    function spinWheel() {
        if (isSpinning) return;
        isSpinning = true;
        document.getElementById('spinBtn').disabled = true;

        const spinDuration = 4000;
        const extraDegrees = Math.floor(Math.random() * 360) + 3600; 
        const canvasObj = document.getElementById('canvas');
        
        canvasObj.style.transition = `transform ${spinDuration}ms cubic-bezier(0.15, 0, 0.15, 1)`;
        canvasObj.style.transform = `rotate(${extraDegrees}deg)`;

        setTimeout(() => {
            isSpinning = false;
            document.getElementById('spinBtn').disabled = false;
            
            // ক্যালকুলেশন কোন আইটেম আসলো
            const actualDeg = extraDegrees % 360;
            const numOptions = options.length;
            const arcDeg = 360 / numOptions;
            const index = Math.floor((360 - (actualDeg - 90) % 360) % 360 / arcDeg);
            
            showPopup("🎉 ঈদ মোবারক!", "আপনি পেয়েছেন: " + options[index]);
            
            // পরবর্তী স্পিনের জন্য রিসেট
            canvasObj.style.transition = 'none';
            canvasObj.style.transform = `rotate(${actualDeg}deg)`;
        }, spinDuration);
    }

    function updateWheel() {
        const text = document.getElementById('salamiItems').value;
        const newOptions = text.split("\n").map(item => item.trim()).filter(item => item !== "");
        
        if(newOptions.length < 2) {
            showPopup("ভুল!", "কমপক্ষে ২টি আইটেম লিখুন!");
            return;
        }

        const encodedData = newOptions.map(encodeURIComponent).join(',');
        const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?items=' + encodedData;
        window.history.pushState({path:newUrl},'',newUrl);
        
        options = newOptions;
        drawWheel();
        closeModal('editModal');
    }

    function showPopup(title, msg) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMsg').innerText = msg;
        document.getElementById('customModal').style.display = 'block';
    }

    function shareLink() {
        const url = window.location.href;
        navigator.clipboard.writeText(url).then(() => {
            showPopup("লিঙ্ক কপি হয়েছে!", "আপনার বন্ধুদের পাঠিয়ে দিন। তারা আপনার সেট করা সালামি লিস্ট দেখতে পাবে।");
        });
    }

    function openEditModal() {
        document.getElementById('salamiItems').value = options.join("\n");
        document.getElementById('editModal').style.display = 'block';
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }

    window.onload = loadData;
</script>

</body>
</html>
