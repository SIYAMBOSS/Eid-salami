<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salami Wheel - Precision Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6c5ce7; --bg: #0f0c29; }
        body { background: #0f0c29; color: white; font-family: 'Poppins', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            padding: 30px 20px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 90%; max-width: 400px; text-align: center;
        }

        .live-badge { background: rgba(255, 71, 87, 0.15); color: #ff4757; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 15px; display: inline-block; }

        #wheel-container {
            position: relative; width: 320px; height: 320px; margin: 20px auto;
            border-radius: 50%; box-shadow: 0 0 50px rgba(108, 92, 231, 0.2);
        }

        /* পয়েন্টার একদম টপে ফিক্সড */
        .pointer {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 35px; z-index: 100; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        canvas { width: 100%; height: 100%; border-radius: 50%; transition: transform 5s cubic-bezier(0.2, 0, 0.1, 1); }

        .spin-btn {
            background: linear-gradient(45deg, #6c5ce7, #fd79a8);
            border: none; color: white; padding: 15px 0; width: 85%;
            font-size: 18px; font-weight: bold; border-radius: 50px;
            cursor: pointer; margin-top: 25px; box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3);
            text-transform: uppercase; letter-spacing: 1px;
        }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
        .modal-content { background: #1e1e2f; margin: 40% auto; padding: 35px; width: 75%; max-width: 280px; border-radius: 30px; text-align: center; border: 2px solid #6c5ce7; }
    </style>
</head>
<body>

<div class="container">
    <div class="live-badge">● LIVE: <span id="viewCount">3,136</span></div>
    <h2 style="margin: 5px 0;">Salami Wheel ✨</h2>
    <p style="color: #aaa; font-size: 13px;">আপনার সালামি বুঝে নিন</p>

    <div id="wheel-container">
        <img src="https://i.ibb.co/vY7p0YV/pointer.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/8213/8213522.png'" class="pointer">
        <canvas id="canvas" width="600" height="600"></canvas>
    </div>

    <button class="spin-btn" id="spinBtn" onclick="spinWheel()">Spin Now</button>
</div>

<div id="winModal" class="modal">
    <div class="modal-content">
        <h2 style="color: #fd79a8; margin: 0;">অভিনন্দন! 🎉</h2>
        <div style="font-size: 45px; margin: 15px 0;">💰</div>
        <p id="modalMsg" style="font-size: 26px; font-weight: bold; margin-bottom: 25px;"></p>
        <button onclick="closeModal()" style="background: #6c5ce7; color: white; border: none; padding: 12px 0; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer;">OK</button>
    </div>
</div>

<audio id="tickSound" src="https://www.soundjay.com/buttons/button-29.mp3"></audio>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const tickSound = document.getElementById('tickSound');
    
    // ফিক্সড ডাটা
    const options = ["1.1", "1.2", "1.3", "1.4", "1.5", "1.6", "1.7", "1.8", "1.9", "2.0"];
    const colors = ["#4834d4", "#2d3436", "#6c5ce7", "#1e272e", "#fd79a8", "#2d3436", "#686de0", "#1e272e", "#a29bfe", "#eb4d4b"];

    let currentRotation = 0;
    let isSpinning = false;

    function drawWheel() {
        const numSlices = options.length;
        const arc = (2 * Math.PI) / numSlices;
        
        ctx.clearRect(0,0,600,600);
        ctx.translate(300, 300);

        for(let i = 0; i < numSlices; i++) {
            const angle = i * arc;
            
            // Slice Drawing
            ctx.fillStyle = colors[i % colors.length];
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.arc(0, 0, 290, angle, angle + arc);
            ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.1)";
            ctx.stroke();

            // Text Drawing
            ctx.save();
            ctx.fillStyle = "white";
            ctx.font = "bold 28px Arial";
            ctx.rotate(angle + arc/2);
            ctx.textAlign = "right";
            ctx.fillText(options[i], 240, 10);
            ctx.restore();
        }
    }

    function spinWheel() {
        if (isSpinning) return;
        isSpinning = true;
        document.getElementById('spinBtn').disabled = true;

        const numSlices = options.length;
        const sliceDeg = 360 / numSlices;
        
        // Randomly pick winning index
        const winIdx = Math.floor(Math.random() * numSlices);
        
        /* Precision Logic:
           Point 0deg is at 3 o'clock. Pointer is at 12 o'clock (270deg).
           Calculation ensures the winIdx lands exactly under the pointer.
        */
        const stopDeg = (360 - (winIdx * sliceDeg)) - (sliceDeg / 2);
        const totalSpins = 360 * 10; // 10 rotations
        
        currentRotation += totalSpins + stopDeg + (360 - (currentRotation % 360));
        canvas.style.transform = `rotate(${currentRotation + 270}deg)`; 

        // Sound Logic
        let lastIdx = -1;
        const ticker = setInterval(() => {
            const style = window.getComputedStyle(canvas);
            const matrix = new WebKitCSSMatrix(style.transform);
            const angle = Math.atan2(matrix.m12, matrix.m11) * (180 / Math.PI);
            const normAngle = (angle < 0) ? angle + 360 : angle;
            const currentIdx = Math.floor(((360 - normAngle + 270) % 360) / sliceDeg) % numSlices;
            
            if(currentIdx !== lastIdx) {
                tickSound.currentTime = 0;
                tickSound.play().catch(()=>{});
                lastIdx = currentIdx;
            }
        }, 60);

        setTimeout(() => {
            clearInterval(ticker);
            isSpinning = false;
            document.getElementById('spinBtn').disabled = false;
            document.getElementById('modalMsg').innerText = "আপনি " + options[winIdx] + " পেয়েছেন";
            document.getElementById('winModal').style.display = 'block';
        }, 5100);
    }

    function closeModal() { document.getElementById('winModal').style.display = 'none'; }
    
    // Initial Draw
    drawWheel();
</script>
</body>
</html>
