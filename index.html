<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Salami Wheel - Premium Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --eid-gold: #ffd700; --eid-green: #00332c; }
        body { 
            background: radial-gradient(circle at center, #00332c 0%, #001a14 100%); 
            color: white; font-family: 'Hind Siliguri', 'Poppins', sans-serif; 
            margin: 0; display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; overflow-x: hidden;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            padding: 30px 15px; border-radius: 40px; border: 1px solid rgba(255, 215, 0, 0.2);
            width: 92%; max-width: 400px; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .eid-decor { font-size: 20px; color: var(--eid-gold); margin-bottom: 5px; }
        h1 { font-size: 28px; margin: 5px 0; color: var(--eid-gold); text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        
        #ad-top { margin: 15px 0; min-height: 50px; width: 100%; overflow: hidden; }

        #wheel-container { 
            position: relative; width: 300px; height: 300px; margin: 15px auto; 
            border: 6px solid rgba(255, 215, 0, 0.1); border-radius: 50%; 
        }
        .pointer { 
            position: absolute; top: -12px; left: 50%; transform: translateX(-50%); 
            width: 35px; z-index: 100; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); 
        }

        canvas { width: 100%; height: 100%; border-radius: 50%; transition: transform 5s cubic-bezier(0.2, 0, 0.1, 1); }

        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 25px; align-items: center; }
        .spin-btn { 
            background: linear-gradient(45deg, #ffd700, #b8860b); border: none; 
            color: #001a14; padding: 15px 0; width: 90%; font-size: 18px; 
            font-weight: bold; border-radius: 50px; cursor: pointer; 
            text-transform: uppercase; box-shadow: 0 5px 15px rgba(255,215,0,0.3); 
        }
        .share-btn { 
            background: transparent; border: 1px solid rgba(255, 215, 0, 0.4); 
            color: var(--eid-gold); padding: 8px 25px; border-radius: 50px; 
            cursor: pointer; font-size: 13px; 
        }

        #ad-bottom { margin-top: 20px; min-height: 50px; width: 100%; overflow: hidden; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
        .modal-content { 
            background: #002b24; margin: 45% auto; padding: 35px 20px; 
            width: 75%; max-width: 280px; border-radius: 30px; 
            border: 2px solid var(--eid-gold); text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="eid-decor">🌙 ⭐</div>
    <h1>Eid Salami ✨</h1>

    <div id="ad-top">
        <script src="https://pl28946683.profitablecpmratenetwork.com/92/58/98/92589880168239af1cbf84c383df5558.js"></script>
    </div>

    <p style="font-size: 14px; color: #bdc3c7;">সালামি নিতে চাকাটি ঘুরান 🥰</p>

    <div id="wheel-container">
        <img src="https://cdn-icons-png.flaticon.com/512/8213/8213522.png" class="pointer" alt="pointer">
        <canvas id="canvas" width="600" height="600"></canvas>
    </div>

    <div class="btn-group">
        <button class="spin-btn" id="spinBtn" onclick="spinWheel()">Spin Now</button>
        <button class="share-btn" onclick="shareLink()">🔗 Share with Friends</button>
    </div>

    <div id="ad-bottom">
        <script src="https://pl28946683.profitablecpmratenetwork.com/92/58/98/92589880168239af1cbf84c383df5558.js"></script>
    </div>
</div>

<div id="winModal" class="modal">
    <div class="modal-content">
        <h2 style="color: var(--eid-gold); margin: 0;">ঈদ মোবারক! 🌙</h2>
        <div style="font-size: 40px; margin: 15px 0;">💌</div>
        <p style="color: #eee; margin: 0;">আপনার ঈদ সালামি:</p>
        <p id="modalMsg" style="font-size: 30px; font-weight: bold; color: var(--eid-gold); margin: 10px 0;"></p>
        <button onclick="closeModal()" style="background: var(--eid-gold); color: #001a14; border: none; padding: 12px 0; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer;">আলহামদুলিল্লাহ</button>
    </div>
</div>

<audio id="tickSound" src="https://www.soundjay.com/buttons/button-29.mp3"></audio>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const tickSound = document.getElementById('tickSound');
    
    // Fixed Data: 1.1 TK to 2.0 TK
    const options = ["1.1 TK", "1.2 TK", "1.3 TK", "1.4 TK", "1.5 TK", "1.6 TK", "1.7 TK", "1.8 TK", "1.9 TK", "2.0 TK"];
    const colors = ["#006266", "#1e272e", "#009432", "#2d3436", "#006266", "#1e272e", "#009432", "#2d3436", "#006266", "#1e272e"];

    let currentRotation = 0;
    let isSpinning = false;

    function drawWheel() {
        const arc = (2 * Math.PI) / options.length;
        ctx.clearRect(0,0,600,600);
        ctx.translate(300, 300);

        for(let i = 0; i < options.length; i++) {
            const angle = i * arc;
            ctx.fillStyle = colors[i % colors.length];
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.arc(0, 0, 290, angle, angle + arc); ctx.fill();
            ctx.strokeStyle = "rgba(255,215,0,0.2)"; ctx.lineWidth = 2; ctx.stroke();

            ctx.save();
            ctx.fillStyle = "#ffd700"; ctx.font = "bold 24px Arial"; ctx.rotate(angle + arc/2);
            ctx.textAlign = "right"; ctx.fillText(options[i], 250, 10);
            ctx.restore();
        }
    }

    function spinWheel() {
        if (isSpinning) return;
        isSpinning = true;
        document.getElementById('spinBtn').disabled = true;

        const sliceDeg = 360 / options.length;
        const winIdx = Math.floor(Math.random() * options.length);
        const stopDeg = (360 - (winIdx * sliceDeg)) - (sliceDeg / 2);
        
        currentRotation += (360 * 10) + stopDeg + (360 - (currentRotation % 360));
        canvas.style.transform = `rotate(${currentRotation + 270}deg)`; 

        let lastIdx = -1;
        const ticker = setInterval(() => {
            const style = window.getComputedStyle(canvas);
            const matrix = new WebKitCSSMatrix(style.transform);
            const angle = Math.atan2(matrix.m12, matrix.m11) * (180 / Math.PI);
            const norm = (angle < 0) ? angle + 360 : angle;
            const currentIdx = Math.floor(((360 - norm + 270) % 360) / sliceDeg) % options.length;
            if(currentIdx !== lastIdx) {
                tickSound.currentTime = 0; tickSound.play().catch(()=>{});
                lastIdx = currentIdx;
            }
        }, 60);

        setTimeout(() => {
            clearInterval(ticker);
            isSpinning = false;
            document.getElementById('spinBtn').disabled = false;
            document.getElementById('modalMsg').innerText = options[winIdx];
            document.getElementById('winModal').style.display = 'block';
        }, 5100);
    }

    function closeModal() { document.getElementById('winModal').style.display = 'none'; }
    function shareLink() {
        const text = "আমার ঈদ সালামি পেয়েছি! তুমিও তোমার ভাগ পরীক্ষা করো: ";
        if (navigator.share) {
            navigator.share({ title: 'Eid Salami Wheel', text: text, url: window.location.href });
        } else {
            navigator.clipboard.writeText(window.location.href);
            alert("লিঙ্ক কপি হয়েছে!");
        }
    }
    
    drawWheel();
</script>
</body>
</html>
