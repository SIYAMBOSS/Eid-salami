<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salami Wheel</title>
    <style>
        body { text-align: center; font-family: 'Arial', sans-serif; background: #f0f2f5; }
        .container { margin-top: 50px; }
        #canvas { margin: 20px; border-radius: 50%; border: 5px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.2); }
        button { padding: 10px 30px; font-size: 18px; cursor: pointer; background: #ff4757; color: #fff; border: none; border-radius: 25px; transition: 0.3s; }
        button:hover { background: #ff6b81; }
        .pointer { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid blue; position: absolute; left: 50%; transform: translateX(-50%); z-index: 10; }
    </style>
</head>
<body>

<div class="container">
    <h1>Salami Wheel..!! 🖤</h1>
    <p>Pick your EID salami..!! 🥰</p>
    <div style="position: relative; display: inline-block;">
        <div class="pointer"></div>
        <canvas id="canvas" width="400" height="400"></canvas>
    </div>
    <br>
    <button onclick="spinWheel()">Spin Now!</button>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const options = ["5 Taka", "10 Taka", "2 Taka", "20 Taka", "50 Taka", "1 Taka", "100 Taka", "5 Taka"];
    const colors = ["#ff595e", "#ffca3a", "#8ac926", "#1982c4", "#6a4c93", "#f72585", "#4cc9f0", "#3a0ca3"];
    
    let startAngle = 0;
    const arc = Math.PI / (options.length / 2);
    let spinTimeout = null;
    let spinAngleStart = 10;
    let spinTime = 0;
    let spinTimeTotal = 0;

    function drawWheel() {
        ctx.clearRect(0,0,400,400);
        for(let i = 0; i < options.length; i++) {
            const angle = startAngle + i * arc;
            ctx.fillStyle = colors[i];
            ctx.beginPath();
            ctx.moveTo(200, 200);
            ctx.arc(200, 200, 180, angle, angle + arc, false);
            ctx.fill();
            ctx.save();
            ctx.fillStyle = "white";
            ctx.translate(200 + Math.cos(angle + arc / 2) * 130, 200 + Math.sin(angle + arc / 2) * 130);
            ctx.rotate(angle + arc / 2 + Math.PI / 2);
            ctx.fillText(options[i], -ctx.measureText(options[i]).width / 2, 0);
            ctx.restore();
        }
    }

    function spinWheel() {
        spinAngleStart = Math.random() * 10 + 10;
        spinTime = 0;
        spinTimeTotal = Math.random() * 3000 + 4000;
        rotateWheel();
    }

    function rotateWheel() {
        spinTime += 30;
        if(spinTime >= spinTimeTotal) {
            stopRotateWheel();
            return;
        }
        const spinAngle = spinAngleStart - easeOut(spinTime, 0, spinAngleStart, spinTimeTotal);
        startAngle += (spinAngle * Math.PI / 180);
        drawWheel();
        spinTimeout = setTimeout(rotateWheel, 30);
    }

    function stopRotateWheel() {
        clearTimeout(spinTimeout);
        const degrees = startAngle * 180 / Math.PI + 90;
        const arcd = arc * 180 / Math.PI;
        const index = Math.floor((360 - degrees % 360) / arcd);
        alert("ঈদ মোবারক! আপনি পেয়েছেন: " + options[index]);
    }

    function easeOut(t, b, c, d) {
        const ts = (t /= d) * t;
        const tc = ts * t;
        return b + c * (tc + -3 * ts + 3 * t);
    }

    drawWheel();
</script>

</body>
</html>
