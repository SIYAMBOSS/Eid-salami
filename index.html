<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salami Wheel</title>
    <style>
        body { text-align: center; font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); margin: 0; padding: 15px; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #333; }
        .container { max-width: 420px; width: 100%; background: #ffffff; padding: 25px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        
        .live-count { background: #eb4d4b; color: white; padding: 8px 20px; border-radius: 50px; font-size: 14px; font-weight: bold; display: inline-block; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(235, 77, 75, 0.4); }
        .live-count span { color: #f9ca24; font-size: 16px; }

        #canvasContainer { 
            position: relative; display: inline-block; border-radius: 50%; width: 320px; height: 320px;
            background: #f1f2f6; border: 10px solid #ffffff; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden;
        }
        #canvas { width: 100%; height: 100%; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
        .pointer { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #130f40; position: absolute; left: 50%; transform: translateX(-50%); z-index: 20; top: -5px; }
        
        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 25px; }
        button { padding: 14px 20px; font-size: 15px; cursor: pointer; border: none; border-radius: 15px; transition: 0.3s; font-weight: bold; }
        .spin-btn { background: #ff4757; color: white; width: 100%; box-shadow: 0 6px #c0392b; text-transform: uppercase; }
        .spin-btn:active { box-shadow: none; transform: translateY(6px); }
        .share-btn { background: #27ae60; color: white; flex: 1; }
        .edit-btn { background: #2980b9; color: white; flex: 1; }
        
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 20% auto; padding: 25px; width: 85%; max-width: 320px; border-radius: 20px; text-align: left; }
        textarea, input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div id="liveCountBox" class="live-count">🌍 Total Spins: <span id="viewCount">1,580</span></div>
    
    <h1 id="displayTitle" style="margin: 0; font-size: 24px;">Salami Wheel..!! 🖤</h1>
    <p id="displayCaption" style="color: #666; margin-bottom: 20px;">আপনার সালামি বুঝে নিন 🥰</p>
    
    <div style="position: relative; display: inline-block;">
        <div class="pointer"></div>
        <div id="canvasContainer">
            <canvas id="canvas" width="500" height="500"></canvas>
        </div>
    </div>

    <div class="controls">
        <button class="spin-btn" id="spinBtn" onclick="spinWheel()">Spin Now!</button>
        <button class="edit-btn" onclick="openEditModal()">Edit All</button>
        <button class="share-btn" onclick="shareLink()">Share Link</button>
    </div>
</div>

<audio id="tickSound" src="https://www.soundjay.com/buttons/button-29.mp3"></audio>
<audio id="winSound" src="https://www.myinstants.com/media/sounds/tada.mp3"></audio>

<div id="customModal" class="modal">
    <div class="modal-content" style="text-align: center;">
        <h2 style="color: #ff4757;">🎊 অভিনন্দন!</h2>
        <p id="modalMsg" style="font-size: 22px; font-weight: bold;"></p>
        <button onclick="closeModal('customModal')" style="background: #27ae60; color: white; width: 100%; padding: 12px; border-radius: 12px;">OK</button>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3 style="text-align: center; margin-top: 0;">Settings</h3>
        <label>Title:</label> <input type="text" id="editTitle">
        <label>Caption:</label> <input type="text" id="editCaption">
        <label>Amounts (Per Line):</label> <textarea id="editItems" rows="5"></textarea>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button onclick="updateAll()" style="background: #2980b9; color: white; flex: 1;">Update</button>
            <button onclick="closeModal('editModal')" style="background: #ccc; flex: 1;">Cancel</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const tickSound = document.getElementById('tickSound');
    const winSound = document.getElementById('winSound');
    const colors = ["#ff9f43", "#ee5253", "#1dd1a1", "#54a0ff", "#5f27cd", "#f368e0", "#ff6b6b", "#48dbfb"];
    
    let options = [];
    let isSpinning = false;
    let currentRotation = 0;
    let wheelID = "v1_global";

    function loadData() {
        const urlParams = new URLSearchParams(window.location.search);
        const d = urlParams.get('d');
        if (d) {
            try {
                const decoded = JSON.parse(atob(d));
                options = decoded.i;
                document.getElementById('displayTitle').innerText = decoded.t;
                document.getElementById('displayCaption').innerText = decoded.c;
                wheelID = btoa(decoded.t).substring(0,8);
            } catch(e) { setDefault(); }
        } else { setDefault(); }
        drawWheel();
        startCounter();
    }

    function setDefault() {
        options = ["5", "10", "2", "20", "50", "100", "1", "5", "10", "2"];
    }

    function startCounter() {
        let count = 1580;
        setInterval(() => {
            count += Math.floor(Math.random() * 2) + 1;
            document.getElementById('viewCount').innerText = count.toLocaleString();
        }, 3000);
    }

    function drawWheel() {
        const arc = (2 * Math.PI) / options.length;
        ctx.clearRect(0,0,500,500);
        for(let i = 0; i < options.length; i++) {
            ctx.fillStyle = colors[i % colors.length];
            ctx.beginPath(); ctx.moveTo(250, 250);
            ctx.arc(250, 250, 250, i * arc, (i + 1) * arc, false); ctx.fill();
            ctx.save(); ctx.fillStyle = "white"; ctx.font = "bold 22px Arial";
            ctx.translate(250, 250); ctx.rotate(i * arc + arc/2);
            ctx.fillText(options[i] + " TK", 110, 10); ctx.restore();
        }
    }

    function spinWheel() {
        if (isSpinning) return;
        isSpinning = true;
        document.getElementById('spinBtn').disabled = true;

        const arcDeg = 360 / options.length;
        let targetIndex;

        const saved = localStorage.getItem("res_" + wheelID);
        if (saved !== null) {
            targetIndex = parseInt(saved);
        } else {
            targetIndex = Math.floor(Math.random() * options.length);
            localStorage.setItem("res_" + wheelID, targetIndex);
        }

        const targetDeg = 360 - (targetIndex * arcDeg) - (arcDeg / 2);
        currentRotation += 3600 + targetDeg + (360 - (currentRotation % 360));
        canvas.style.transform = `rotate(${currentRotation}deg)`;

        let lastIdx = -1;
        const tickInterval = setInterval(() => {
            const style = window.getComputedStyle(canvas);
            const matrix = new WebKitCSSMatrix(style.transform);
            const angle = Math.atan2(matrix.m12, matrix.m11) * (180 / Math.PI);
            const norm = (angle < 0 ? angle + 360 : angle);
            const currentIdx = Math.floor((360 - (norm - 90) % 360) % 360 / arcDeg);
            if(currentIdx !== lastIdx) {
                tickSound.currentTime = 0;
                tickSound.play().catch(()=>{});
                lastIdx = currentIdx;
            }
        }, 80);

        setTimeout(() => {
            clearInterval(tickInterval);
            isSpinning = false;
            document.getElementById('spinBtn').disabled = false;
            winSound.play().catch(() => {});
            document.getElementById('modalMsg').innerText = "আপনি পেয়েছেন: " + options[targetIndex] + " Taka";
            document.getElementById('customModal').style.display = 'block';
        }, 4000);
    }

    // Edit Functionality
    function openEditModal() {
        document.getElementById('editTitle').value = document.getElementById('displayTitle').innerText;
        document.getElementById('editCaption').value = document.getElementById('displayCaption').innerText;
        document.getElementById('editItems').value = options.join("\n");
        document.getElementById('editModal').style.display = 'block';
    }

    function updateAll() {
        const t = document.getElementById('editTitle').value;
        const c = document.getElementById('editCaption').value;
        const i = document.getElementById('editItems').value.split("\n").filter(x => x.trim() !== "");
        
        const data = { t, c, i };
        const encoded = btoa(JSON.stringify(data));
        window.location.href = window.location.origin + window.location.pathname + "?d=" + encoded;
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function shareLink() { navigator.clipboard.writeText(window.location.href); alert("লিঙ্ক কপি হয়েছে!"); }
    window.onload = loadData;
</script>
</body>
</html>
