<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salami Wheel</title>
    <style>
        body { text-align: center; font-family: 'Arial', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* ব্যাকগ্রাউন্ড ইমেজের জন্য স্টাইল */
        #canvasContainer { 
            position: relative; 
            display: inline-block; 
            border-radius: 50%; 
            overflow: hidden;
            width: 400px;
            height: 400px;
            background-image: url('https://i.ibb.co/3mN98Cg/lantern-bg.jpg'); /* এখানে আপনার ছবি থাকবে */
            background-size: cover;
            background-position: center;
            border: 8px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        #canvas { width: 100%; height: 100%; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        
        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
        button { padding: 12px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; transition: 0.3s; font-weight: bold; }
        .spin-btn { background: #ff4757; color: white; width: 100%; margin-bottom: 10px; }
        .share-btn { background: #2ed573; color: white; flex: 1; }
        .edit-btn { background: #1e90ff; color: white; flex: 1; }
        
        .pointer { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #ff4757; position: absolute; left: 50%; transform: translateX(-50%); z-index: 20; top: -5px; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3)); }
        
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { background: white; margin: 15% auto; padding: 25px; width: 85%; max-width: 350px; border-radius: 15px; text-align: left; }
        textarea { width: 100%; height: 100px; margin: 10px 0; padding: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; resize: none; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="displayTitle">Salami Wheel..!! 🖤</h1>
    <p id="displayCaption">আপনার সালামি বুঝে নিন 🥰</p>
    
    <div style="position: relative; display: inline-block;">
        <div class="pointer"></div>
        <div id="canvasContainer">
            <canvas id="canvas" width="500" height="500"></canvas>
        </div>
    </div>

    <div class="controls">
        <button class="spin-btn" id="spinBtn" onclick="spinWheel()">Spin Now!</button>
        <button class="edit-btn" onclick="openEditModal()">Edit All</button>
        <button class="share-btn" onclick="shareLink()">Share Link</button>
    </div>
</div>

<div id="customModal" class="modal">
    <div class="modal-content" style="text-align: center;">
        <h2 id="modalTitle"></h2>
        <p id="modalMsg"></p>
        <button onclick="closeModal('customModal')" style="background: #ff4757; color: white; width: 100%; padding: 10px; border-radius: 8px;">OK</button>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3 style="text-align: center;">সেটিংস এডিট করুন</h3>
        <label>টাইটেল:</label>
        <input type="text" id="editTitle">
        <label>ক্যাপশন:</label>
        <input type="text" id="editCaption">
        <label>সালামি (প্রতি লাইনে একটি সংখ্যা):</label>
        <textarea id="salamiItems"></textarea>
        <div style="display: flex; gap: 10px;">
            <button onclick="updateAll()" style="background: #1e90ff; color: white; flex: 1;">Update</button>
            <button onclick="closeModal('editModal')" style="background: #ccc; flex: 1;">Cancel</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    // কালারগুলোতে হালকা ট্রান্সপারেন্সি দেওয়া হয়েছে যাতে ব্যাকগ্রাউন্ডের ছবি কিছুটা বোঝা যায়
    const colors = ["rgba(255, 89, 94, 0.7)", "rgba(255, 202, 58, 0.7)", "rgba(138, 201, 38, 0.7)", "rgba(25, 130, 196, 0.7)", "rgba(106, 76, 147, 0.7)", "rgba(247, 37, 133, 0.7)", "rgba(76, 201, 240, 0.7)"];
    
    let options = [];
    let currentTitle = "";
    let currentCaption = "";
    let startAngle = 0;
    let isSpinning = false;

    function loadData() {
        const urlParams = new URLSearchParams(window.location.search);
        const itemsData = urlParams.get('items');
        currentTitle = urlParams.get('t') || "Salami Wheel..!! 🖤";
        currentCaption = urlParams.get('c') || "আপনার সালামি বুঝে নিন 🥰";
        
        options = itemsData ? itemsData.split(',').map(decodeURIComponent) : ["10", "50", "100", "5", "20", "500", "10", "1000"];
        
        document.getElementById('displayTitle').innerText = currentTitle;
        document.getElementById('displayCaption').innerText = currentCaption;
        drawWheel();
    }

    function drawWheel() {
        const numOptions = options.length;
        const arc = (2 * Math.PI) / numOptions;
        ctx.clearRect(0,0,500,500);

        for(let i = 0; i < numOptions; i++) {
            const angle = startAngle + i * arc;
            ctx.fillStyle = colors[i % colors.length];
            ctx.beginPath();
            ctx.moveTo(250, 250);
            ctx.arc(250, 250, 250, angle, angle + arc, false);
            ctx.fill();

            // লম্বালম্বি টেক্সট
            ctx.save();
            ctx.fillStyle = "white";
            ctx.font = "bold 18px Arial";
            ctx.translate(250, 250);
            ctx.rotate(angle + arc / 2);
            const text = options[i] + " Taka";
            ctx.fillText(text, 100, 5); 
            ctx.restore();
        }
    }

    function spinWheel() {
        if (isSpinning) return;
        isSpinning = true;
        document.getElementById('spinBtn').disabled = true;

        const extraDegrees = Math.floor(Math.random() * 360) + 3600; 
        canvas.style.transform = `rotate(${extraDegrees}deg)`;

        setTimeout(() => {
            isSpinning = false;
            document.getElementById('spinBtn').disabled = false;
            const actualDeg = extraDegrees % 360;
            const index = Math.floor((360 - (actualDeg - 90) % 360) % 360 / (360 / options.length));
            
            showPopup("🎊 ঈদ মোবারক!", "আপনি পেয়েছেন: " + options[index] + " Taka");
            canvas.style.transition = 'none';
            canvas.style.transform = `rotate(${actualDeg}deg)`;
            setTimeout(() => canvas.style.transition = 'transform 4s cubic-bezier(0.15, 0, 0.15, 1)', 50);
        }, 4000);
    }

    function updateAll() {
        const newTitle = document.getElementById('editTitle').value;
        const newCaption = document.getElementById('editCaption').value;
        const newOptions = document.getElementById('salamiItems').value.split("\n").map(s => s.trim()).filter(s => s !== "");
        
        if(newOptions.length < 2) return alert("কমপক্ষে ২টি ঘর দিন!");

        const newUrl = `${window.location.protocol}//${window.location.host}${window.location.pathname}?items=${newOptions.map(encodeURIComponent).join(',')}&t=${encodeURIComponent(newTitle)}&c=${encodeURIComponent(newCaption)}`;
        window.history.pushState({path:newUrl},'',newUrl);
        
        location.reload(); // ডাটা আপডেট করে পেজ রিফ্রেশ
    }

    function showPopup(t, m) {
        document.getElementById('modalTitle').innerText = t;
        document.getElementById('modalMsg').innerText = m;
        document.getElementById('customModal').style.display = 'block';
    }

    function shareLink() {
        navigator.clipboard.writeText(window.location.href);
        showPopup("লিঙ্ক কপি হয়েছে!", "বন্ধুদের পাঠিয়ে দিন।");
    }

    function openEditModal() {
        document.getElementById('editTitle').value = currentTitle;
        document.getElementById('editCaption').value = currentCaption;
        document.getElementById('salamiItems').value = options.join("\n");
        document.getElementById('editModal').style.display = 'block';
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    window.onload = loadData;
</script>

</body>
</html>
